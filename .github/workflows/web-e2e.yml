# Playwright: fluxo passageiro + motorista (API real + Vite com VITE_E2E)
name: web-e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install backend & migrate; start API; run Playwright
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-characters-long
          OTP_SECRET: ci-otp-secret-key-at-least-32-characters-long
          STRIPE_SECRET_KEY: sk_test_ci_placeholder_not_used
          STRIPE_MOCK: "true"
          ENV: dev
          CI: true
        run: |
          cd backend
          pip install -r requirements.txt
          alembic upgrade head
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/openapi.json >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/openapi.json >/dev/null
          cd ../web-app
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e
