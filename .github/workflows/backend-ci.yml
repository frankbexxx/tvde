# A032 — CI: testes automáticos com PostgreSQL (push main + PRs)
name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff check
        run: ruff check .

      - name: Install audit/type tools
        run: pip install mypy bandit pip-audit

      - name: Mypy (critical backend modules)
        run: mypy --config-file mypy.ini app/api/routers/webhooks/stripe.py app/sentry.py

      - name: Bandit (SAST)
        run: bandit -r app -c bandit.yaml -q

      - name: pip-audit (requirements)
        run: pip-audit -r requirements.txt

      - name: Apply Alembic migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-characters-long
          OTP_SECRET: ci-otp-secret-key-at-least-32-characters-long
          STRIPE_MOCK: "true"
          ENV: dev
        run: alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-characters-long
          OTP_SECRET: ci-otp-secret-key-at-least-32-characters-long
          STRIPE_MOCK: "true"
          ENV: dev
        run: pytest tests/ -v
