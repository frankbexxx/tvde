name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancelar runs obsoletos quando se faz push rapido para o mesmo PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc -b --noEmit

      - name: Unit tests (vitest)
        run: npm run test -- --run

  backend-lint:
    name: Backend (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install "ruff>=0.9.0"

      - name: Ruff check
        run: ruff check .

# Notas para iteracoes seguintes (nao bloquear PR inicial):
#   - `ruff format --check .` actualmente reporta 13 ficheiros por formatar.
#     Plano: PR separado que corre `ruff format .` + adiciona este step ao CI.
#   - Job `backend-tests` com servico postgres + alembic upgrade head + pytest.
#     Requer: JWT_SECRET_KEY, STRIPE_MOCK=true, DATABASE_URL de servico,
#     variaveis minimas no step.
#   - Job `e2e` com Playwright contra um preview build.
