# Security + dependency updates automaticos.
# Segunda-feira semanal, PRs com label claro, limite baixo para nao inundar.

version: 2
updates:
  # Frontend (Vite + React + etc)
  - package-ecosystem: "npm"
    directory: "/web-app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Agrupar minor/patch para reduzir ruido; security vem a parte.
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(web-app)"
      include: "scope"

  # Backend (FastAPI + SQLAlchemy + Alembic + etc)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      backend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"

  # GitHub Actions (actions/checkout, setup-node, etc)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "first monday"
      time: "08:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
